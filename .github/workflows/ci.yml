name: CI

# Caller for the shared reusable CI workflow (chhoumann/obsidian-plugin-workflows).
#
# NO paths-ignore: Test and Build + Lint must run on every PR so they can be
# required status checks without deadlocking docs-only PRs (a required check that
# never runs stays pending forever and blocks merge).
on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    ci:
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/ci.yml@v4
        with:
            package-manager: pnpm
            # Matches .mise.toml (node = "22").
            node-version: "22"
            # test-command defaults to 'pnpm run test'.
            build-command: pnpm run build
            lint-command: pnpm run lint
            # The e2e sources typecheck against a separate tsconfig project.
            check-commands: |
                pnpm run typecheck:e2e
