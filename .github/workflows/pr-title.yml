name: PR Title

# Caller for the shared reusable PR-title workflow.
#
# NoteTweet squash-merges PRs and releases with semantic-release, so the squashed
# PR title becomes the commit semantic-release parses to pick the next version.
# This validates that title is a Conventional Commit before it can be merged.
#
# MUST be pull_request_target: the title of a fork PR is only reliably readable,
# and GITHUB_TOKEN only carries the right context, under this trigger. The
# reusable workflow never checks out PR head code, so this is safe.
on:
    pull_request_target:
        types: [opened, edited, synchronize, reopened]

permissions:
    pull-requests: read

jobs:
    pr-title:
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/pr-title.yml@v1
        permissions:
            pull-requests: read
