name: Dependency Review

# Caller for the shared reusable dependency-review workflow.
#
# NO paths-ignore, so lockfile bumps are always scanned.
on:
    pull_request:
        branches: [master]

permissions:
    contents: read

jobs:
    dependency-review:
        uses: chhoumann/obsidian-plugin-workflows/.github/workflows/dependency-review.yml@v1
        permissions:
            contents: read
            pull-requests: write
